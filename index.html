<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEI Industry Dashboard — Philippines</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;background:#f0f4f8;color:#1a1a1a}
#header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:#1F3864;color:#fff;height:52px;flex-shrink:0;z-index:10}
#header h1{font-size:15px;font-weight:500;letter-spacing:.3px}
.toggle-wrap{display:flex;gap:6px}
.tbtn{padding:5px 20px;border-radius:6px;border:1.5px solid rgba(255,255,255,.35);background:transparent;color:#fff;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.tbtn:hover:not(.active){background:rgba(255,255,255,.12)}
.tbtn.active.peza{background:#3B6D11;border-color:#3B6D11}
.tbtn.active.seipi{background:#BA7517;border-color:#BA7517}
.tbtn.active.all{background:#2563EB;border-color:#2563EB}
#zoom-hint{position:absolute;bottom:10px;right:10px;font-size:11px;color:#6b7280;background:rgba(255,255,255,.75);padding:3px 8px;border-radius:4px;pointer-events:none;}
#content{display:flex;height:calc(100vh - 52px)}
#panel{width:0;overflow:hidden;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;transition:width .28s ease;flex-shrink:0}
#panel.open{width:60%}
#ph{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:#1F3864;color:#fff;flex-shrink:0}
#pname{font-size:14px;font-weight:500}
#pcounts{font-size:11px;opacity:.7;margin-top:2px}
#xbtn{background:none;border:none;color:#fff;cursor:pointer;font-size:18px;padding:2px 7px;border-radius:4px;line-height:1}
#xbtn:hover{background:rgba(255,255,255,.18)}
#pbody{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.sec{flex:0 0 50%;display:flex;flex-direction:column;min-height:0;border-bottom:2px solid #e5e7eb}
.sec:last-child{border-bottom:none}
.stitle{padding:7px 14px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#6b7280;background:#f9fafb;border-bottom:1px solid #e5e7eb;flex-shrink:0}
.tscroll{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{position:sticky;top:0;background:#f3f4f6;padding:7px 12px;text-align:left;font-size:11.5px;font-weight:600;color:#374151;border-bottom:1px solid #d1d5db;z-index:1;white-space:nowrap}
tbody td{padding:6px 12px;border-bottom:1px solid #f3f4f6;vertical-align:top;line-height:1.45}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#f9fafb}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10.5px;font-weight:600;white-space:nowrap}
.bp{background:#EAF3DE;color:#27500A}
.bs{background:#FAEEDA;color:#633806}
.bb{background:#DBEAFE;color:#1D4ED8}
.zt{color:#9ca3af;font-size:11.5px}
#map-wrap{flex:1;position:relative;overflow:hidden;cursor:pointer;background:#D6E4F2}
#mapsvg{width:100%;height:100%;display:block}
.pp{stroke:#fff;stroke-width:.25;cursor:pointer;transition:opacity .12s}
.pp:hover{opacity:.72;stroke-width:.4}
.pp.sel{stroke-width:.6!important;opacity:1!important}
#legend{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.88);border-radius:8px;padding:10px 13px;font-size:11.5px;pointer-events:none;z-index:10;min-width:128px}
#legend-title{font-weight:600;font-size:12px;color:#1F3864;margin-bottom:7px}
.leg-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;color:#374151}
.leg-row:last-child{margin-bottom:0}
.leg-sw{width:13px;height:13px;border-radius:3px;flex-shrink:0;border:1px solid rgba(0,0,0,.1)}
#tooltip{position:absolute;display:none;background:#fff;border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:12px;pointer-events:none;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.13);max-width:210px;line-height:1.6}
.tn{font-weight:600;font-size:13px;color:#1F3864;margin-bottom:2px}
.tr{color:#6b7280}
.empty{padding:18px 14px;color:#9ca3af;font-size:12.5px;font-style:italic}
</style>
</head>
<body>

<div id="header">
  <h1>Semiconductor &amp; Electronics Industry (SEI)</h1>
  <div class="toggle-wrap">
    <button class="tbtn        peza"  id="btn-peza"  onclick="setTog('peza')">PEZA</button>
    <button class="tbtn        seipi" id="btn-seipi" onclick="setTog('seipi')">SEIPI</button>
    <button class="tbtn active all"   id="btn-all"   onclick="setTog('all')">ALL</button>
  </div>
</div>

<div id="content">
  <div id="panel">
    <div id="ph">
      <div><div id="pname">—</div><div id="pcounts"></div></div>
      <button id="xbtn" onclick="closePanel()">✕</button>
    </div>
    <div id="pbody">
      <div class="sec">
        <div class="stitle" id="etitle">Enterprises &amp; Members</div>
        <div class="tscroll"><div id="econtent"></div></div>
      </div>
      <div class="sec">
        <div class="stitle">Job Requirements &amp; TESDA Programs</div>
        <div class="tscroll"><div id="tcontent"></div></div>
      </div>
    </div>
  </div>

  <div id="map-wrap" onclick="bgClick(event)">
    <svg id="mapsvg" viewBox="0 0 620 720" preserveAspectRatio="xMidYMid meet"></svg>
    <div id="tooltip"></div>
    <div id="legend">
      <div id="legend-title">PEZA Members</div>
      <div class="leg-row"><span class="leg-sw" id="ls4"></span>100+</div>
      <div class="leg-row"><span class="leg-sw" id="ls3"></span>41–100</div>
      <div class="leg-row"><span class="leg-sw" id="ls2"></span>16–40</div>
      <div class="leg-row"><span class="leg-sw" id="ls1"></span>6–15</div>
      <div class="leg-row"><span class="leg-sw" id="ls0"></span>1–5</div>
      <div class="leg-row"><span class="leg-sw" style="background:#D1D5DB"></span>No data</div>
    </div>
    <div id="zoom-hint">scroll to zoom · drag to pan</div>
  </div>
</div>

  panel.classList.add('open');
  if(gp){
    gp.selectAll('.pp')
      .classed('sel',function(){return this.dataset.p===prov;})
      .filter(function(){return this.dataset.p===prov;})
      .attr('stroke',function(){return this.getAttribute('fill');});
  }
}

function closePanel(){
  panel.classList.remove('open'); curProv=null;
  if(gp) gp.selectAll('.pp').classed('sel',false).attr('stroke','#fff');
}

function renderE(prov){
  const d=D.provinces[prov];
  const el=document.getElementById('econtent');
  const tl=document.getElementById('etitle');
  if(!d||!d.enterprises.length){el.innerHTML='<div class="empty">No enterprise data.</div>';return;}
  const list=tog==='all'?d.enterprises:d.enterprises.filter(e=>tog==='peza'?(e.type==='PEZA'||e.type==='PEZA & SEIPI'):(e.type==='SEIPI'||e.type==='PEZA & SEIPI'));
  tl.textContent='Enterprises & Members ('+list.length+')';
  if(!list.length){el.innerHTML='<div class="empty">No members under this view.</div>';return;}
  const rows=list.map(e=>{
    const b=e.type==='PEZA'?'<span class="badge bp">PEZA</span>':e.type==='SEIPI'?'<span class="badge bs">SEIPI</span>':'<span class="badge bb">PEZA &amp; SEIPI</span>';
    const z=e.zone&&e.zone!=='—'?'<span class="zt">'+e.zone+'</span>':'<span class="zt">—</span>';
    return'<tr><td>'+e.name+'</td><td>'+b+'</td><td>'+z+'</td></tr>';
  }).join('');
  el.innerHTML='<table><thead><tr><th>Enterprise Name</th><th>Membership</th><th>Economic Zone</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

function renderT(prov){
  const pairs=D.tesda[prov]||[];
  const el=document.getElementById('tcontent');
  if(!pairs.length){el.innerHTML='<div class="empty">No TESDA data for this province.</div>';return;}
  const rows=pairs.map(p=>'<tr><td>'+p.job+'</td><td>'+p.program+'</td></tr>').join('');
  el.innerHTML='<table><thead><tr><th>Job Requirement</th><th>TESDA Program</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

function showTip(ev,prov){
  const d=D.provinces[prov];
  const pz=d?d.peza_count:0, si=d?d.seipi_count:0;
  tip.innerHTML='<div class="tn">'+prov+'</div><div class="tr">PEZA: <strong>'+pz+'</strong></div><div class="tr">SEIPI: <strong>'+si+'</strong></div>';
  tip.style.display='block'; moveTip(ev);
}
function moveTip(ev){
  const r=document.getElementById('map-wrap').getBoundingClientRect();
  const x=ev.clientX-r.left, y=ev.clientY-r.top, tw=200;
  tip.style.left=(x+tw+14>r.width?x-tw-8:x+12)+'px';
  tip.style.top=Math.max(4,y-12)+'px';
}
function hideTip(){tip.style.display='none';}

const W=620,H=720;
const svg=d3.select('#mapsvg');
const bgRect=svg.append('rect').attr('width',W).attr('height',H).attr('fill','#D6E4F2');
const proj=d3.geoMercator().center([122.0,12.2]).scale(1560).translate([W/2,H/2]);
const path=d3.geoPath(proj);
gp=svg.append('g');

// Zoom & pan
let didDrag=false;
const zoomBehavior=d3.zoom()
  .scaleExtent([1,10])
  .on('start',()=>{didDrag=false;})
  .on('zoom',(event)=>{
    didDrag=true;
    gp.attr('transform',event.transform);
  });
svg.call(zoomBehavior).on('dblclick.zoom',null);

function bgClick(e){
  if(didDrag){didDrag=false;return;}
  if(e.target.id==='mapsvg'||e.target.id==='map-wrap')closePanel();
}

d3.json('https://cdn.jsdelivr.net/npm/datamaps@0.5.10/src/js/data/phl.topo.json').then(topo=>{
  const features=topojson.feature(topo,topo.objects.phl).features;
  gp.selectAll('.pp')
    .data(features.filter(f=>f.properties&&f.properties.name))
    .enter().append('path')
    .attr('class','pp')
    .attr('d',path)
    .each(function(d){this.dataset.p=TMAP[d.properties.name]||d.properties.name.toUpperCase();})
    .attr('fill',function(){return getColor(this.dataset.p,tog);})
    .on('mousemove',function(ev,d){showTip(ev,this.dataset.p);})
    .on('mouseleave',hideTip)
    .on('click',function(ev){
      if(didDrag){return;}
      ev.stopPropagation();hideTip();openPanel(this.dataset.p);
    });
}).catch(()=>{
  svg.append('text').attr('x',W/2).attr('y',H/2).attr('text-anchor','middle')
    .attr('fill','#666').attr('font-size','14').text('Map unavailable — check internet connection');
});
</script>
</body>
